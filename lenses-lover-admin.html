<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<script>
/* الثيم بيتحدد قبل أي رسم — يمنع وميض اللون الغامق عند التحديث */
(function(){try{var t=localStorage.getItem('ll_theme')||'light';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','light');}})();
</script>
<style id="ll-theme-boot">
/* ألوان الثيم الفاتح — متعرّفة هنا عشان أول رسمة تبقى فاتحة من غير وميض */
html[data-theme="light"]{
  --ink:#faf7f2; --ink-2:#ffffff; --ink-3:#f0e9dd;
  --ivory:#221c14; --ivory-dim:#6e6558;
  --amber:#a8702e; --amber-light:#c88a3e;
  --line: rgba(21,18,14,0.12);
  color-scheme: light;
}
html[data-theme="light"] body{ background:#faf7f2; color:#221c14; }
</style>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lenseslover — لوحة الطلبات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=Reem+Kufi:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15120e;
    --ink-2:#1e1a15;
    --ink-3:#292219;
    --ivory:#f4ecdf;
    --ivory-dim:#cdc3b2;
    --amber:#c88a3e;
    --amber-light:#e3b368;
    --jade:#3e6b55;
    --jade-light:#6b9e83;
    --rose:#a85c4c;
    --line: rgba(244,236,223,0.14);
    --radius: 22px;
  }

  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--ink);
    color:var(--ivory);
    font-family:'Cairo', sans-serif;
    line-height:1.6;
    overflow-x:hidden;
  }
  body.lang-ar .en{ display:none !important; }
  body.lang-en .ar{ display:none !important; }
  body.lang-en{ font-family:'Cairo', sans-serif; }

  h1,h2,h3{ margin:0; font-weight:700; }
  p{ margin:0; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; border:none; }
  img,svg{ display:block; max-width:100%; }

  .display-ar{ font-family:'Reem Kufi', sans-serif; }
  .display-en{ font-family:'Instrument Serif', serif; font-style:italic; }

  .wrap{ max-width:1240px; margin:0 auto; padding-inline:28px; }
  section{ position:relative; }

  /* ---------- reveal on scroll ---------- */
  .reveal{ opacity:0; transform:translateY(24px); transition:opacity .8s ease, transform .8s ease; }
  .reveal.in-view{ opacity:1; transform:translateY(0); }
  @media (prefers-reduced-motion: reduce){
    .reveal{ opacity:1; transform:none; transition:none; }
  }

  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(21,18,14,0.86);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .nav-row{ display:flex; align-items:center; justify-content:space-between; padding-block:18px; gap:24px; }
  .logo{ font-size:22px; letter-spacing:0.5px; font-weight:800; font-family:'Reem Kufi', sans-serif; color:var(--ivory); white-space:nowrap; }
  .logo span{ color:var(--amber); }
  nav.links{ display:flex; gap:32px; align-items:center; }
  nav.links a{
    font-size:15px; color:var(--ivory-dim); position:relative; padding-block:4px;
    transition:color .25s ease;
  }
  nav.links a::after{
    content:""; position:absolute; inset-inline:0; bottom:-2px; height:1.5px; background:var(--amber);
    transform:scaleX(0); transform-origin:center; transition:transform .3s ease;
  }
  nav.links a:hover{ color:var(--ivory); }
  nav.links a:hover::after{ transform:scaleX(1); }

  .header-actions{ display:flex; align-items:center; gap:14px; }
  .lang-toggle{
    display:flex; align-items:center; gap:6px;
    background:var(--ink-2); border:1px solid var(--line); border-radius:999px;
    padding:6px 6px; font-size:13px; color:var(--ivory-dim);
  }
  .lang-toggle button{
    background:transparent; color:var(--ivory-dim); border-radius:999px; padding:6px 14px; font-size:13px; font-weight:600;
    transition:all .25s ease;
  }
  .lang-toggle button.active{ background:var(--amber); color:var(--ink); }

  .icon-btn{
    width:38px; height:38px; border-radius:50%; background:var(--ink-2); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; position:relative;
    color:var(--ivory); transition:border-color .25s ease;
  }
  .icon-btn:hover{ border-color:var(--amber); }
  .cart-badge{
    position:absolute; top:-6px; inset-inline-end:-6px;
    background:var(--rose); color:var(--ivory); font-size:10px; font-weight:700;
    width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  }

  @media (max-width:860px){
    nav.links{ display:none; }
  }

  /* ---------- hero ---------- */
  .hero{ padding-block:64px 40px; overflow:hidden; }
  .hero-grid{ display:grid; grid-template-columns:1.05fr 0.95fr; gap:56px; align-items:center; }
  @media (max-width:900px){ .hero-grid{ grid-template-columns:1fr; } }

  .eyebrow{
    display:inline-flex; align-items:center; gap:8px; font-size:13px; letter-spacing:0.4px;
    color:var(--amber-light); background:rgba(200,138,62,0.12); border:1px solid rgba(200,138,62,0.35);
    padding:7px 16px; border-radius:999px; margin-bottom:22px;
  }
  .eyebrow .dot{ width:6px; height:6px; border-radius:50%; background:var(--amber); }

  .hero h1{ font-size:56px; line-height:1.15; margin-bottom:20px; color:var(--ivory); }
  .hero h1 em{ color:var(--amber-light); font-style:normal; }
  body.lang-en .hero h1{ font-family:'Instrument Serif', serif; font-weight:400; font-style:italic; font-size:58px; }
  @media (max-width:560px){ .hero h1{ font-size:38px; } body.lang-en .hero h1{ font-size:40px; } }

  .hero p.sub{ font-size:17px; color:var(--ivory-dim); max-width:460px; margin-bottom:32px; }

  .cta-row{ display:flex; gap:16px; flex-wrap:wrap; margin-bottom:38px; }
  .btn{
    display:inline-flex; align-items:center; gap:8px; padding:15px 30px; border-radius:999px;
    font-size:15px; font-weight:700; transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
  }
  .btn-primary{ background:var(--amber); color:var(--ink); box-shadow:0 10px 30px -10px rgba(200,138,62,0.6); }
  .btn-primary:hover{ transform:translateY(-2px); background:var(--amber-light); }
  .btn-ghost{ background:transparent; color:var(--ivory); border:1px solid var(--line); }
  .btn-ghost:hover{ border-color:var(--ivory-dim); transform:translateY(-2px); }

  .trust-strip{ display:flex; gap:22px; flex-wrap:wrap; font-size:13px; color:var(--ivory-dim); }
  .trust-strip span{ display:flex; align-items:center; gap:7px; }
  .trust-strip .flag{ font-size:16px; }

  /* iris signature visual */
  .iris-stage{ position:relative; display:flex; flex-direction:column; align-items:center; gap:26px; }
  .eye-frame{ width:min(420px, 90vw); filter:drop-shadow(0 30px 60px rgba(0,0,0,0.45)); }
  .iris-fill{ transition: fill 0s; }
  .iris-name{ text-align:center; }
  .iris-name .label-ar{ font-size:20px; font-family:'Reem Kufi', sans-serif; color:var(--ivory); }
  .iris-name .label-en{ font-size:19px; font-family:'Instrument Serif', serif; font-style:italic; color:var(--ivory); }
  .iris-name .sub{ font-size:12.5px; color:var(--ivory-dim); letter-spacing:0.5px; margin-top:2px; }

  .swatch-row{ display:flex; gap:12px; }
  .swatch{
    width:34px; height:34px; border-radius:50%; border:2px solid transparent; position:relative;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.25);
    transition:transform .2s ease, border-color .2s ease;
  }
  .swatch:hover{ transform:translateY(-3px); }
  .swatch.active{ border-color:var(--ivory); }
  .swatch.active::after{
    content:""; position:absolute; inset:-6px; border-radius:50%; border:1px solid var(--ivory-dim);
  }

  /* ---------- marquee ---------- */
  .marquee-wrap{ border-block:1px solid var(--line); background:var(--ink-2); padding-block:16px; overflow:hidden; }
  .marquee{ display:flex; gap:48px; width:max-content; animation:scrollX 32s linear infinite; }
  .marquee span{ font-family:'Reem Kufi', sans-serif; font-size:15px; letter-spacing:1px; color:var(--ivory-dim); white-space:nowrap; }
  body.lang-en .marquee span{ font-family:'Instrument Serif', serif; font-style:italic; }
  .marquee span em{ color:var(--amber); font-style:normal; padding-inline:6px; }
  @keyframes scrollX{ from{ transform:translateX(0);} to{ transform:translateX(-50%);} }
  [dir="ltr"] .marquee{ animation-direction:reverse; }

  /* ---------- section headers ---------- */
  .section-head{ display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:36px; flex-wrap:wrap; }
  .section-head .tag{ font-size:13px; color:var(--amber-light); letter-spacing:0.5px; margin-bottom:8px; display:block; }
  .section-head h2{ font-size:34px; font-family:'Reem Kufi', sans-serif; }
  body.lang-en .section-head h2{ font-family:'Instrument Serif', serif; font-style:italic; font-weight:400; }
  .section-head p{ color:var(--ivory-dim); max-width:380px; font-size:14.5px; }

  section.pad{ padding-block:80px; }

  /* ---------- shop by color ---------- */
  .color-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:18px; }
  @media (max-width:900px){ .color-grid{ grid-template-columns:repeat(3,1fr); } }
  @media (max-width:520px){ .color-grid{ grid-template-columns:repeat(2,1fr); } }
  .color-card{
    background:var(--ink-2); border:1px solid var(--line); border-radius:var(--radius);
    padding:22px 14px; text-align:center; transition:transform .3s ease, border-color .3s ease;
  }
  .color-card:hover{ transform:translateY(-6px); border-color:var(--amber); }
  .color-orb{
    width:56px; height:56px; border-radius:50%; margin:0 auto 14px; position:relative;
    box-shadow: inset 0 -4px 10px rgba(0,0,0,0.35), 0 6px 18px -6px rgba(0,0,0,0.5);
  }
  .color-card h3{ font-size:15px; margin-bottom:2px; }
  .color-card .en-name{ font-size:12px; color:var(--ivory-dim); font-family:'Instrument Serif', serif; font-style:italic; }

  /* ---------- product grid ---------- */
  .product-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:22px; }
  @media (max-width:980px){ .product-grid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:560px){ .product-grid{ grid-template-columns:1fr; } }

  .product-card{
    background:var(--ink-2); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
    display:flex; flex-direction:column; transition:transform .3s ease, box-shadow .3s ease;
  }
  .product-card:hover{ transform:translateY(-6px); box-shadow:0 24px 50px -20px rgba(0,0,0,0.6); }
  .product-media{
    height:190px; position:relative; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 50% 42%, var(--c1) 0%, var(--c1) 30%, var(--c2) 72%, var(--ring) 100%);
  }
  .product-media::before{
    content:""; position:absolute; inset:0;
    background:repeating-conic-gradient(rgba(0,0,0,0.10) 0deg 4deg, transparent 4deg 8deg);
    mix-blend-mode:multiply; border-radius:50%; width:92px; height:92px; margin:auto; inset:0;
  }
  .product-media .pupil{ width:34px; height:34px; border-radius:50%; background:#0b0906; position:relative; z-index:2; box-shadow:0 0 0 6px rgba(0,0,0,0.08); }
  .product-media .pupil::after{ content:""; position:absolute; width:9px; height:9px; background:rgba(255,255,255,0.85); border-radius:50%; top:5px; left:6px; }
  .tag-badge{
    position:absolute; top:12px; inset-inline-start:12px; background:var(--rose); color:var(--ivory);
    font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:999px;
  }
  .wish-btn{
    position:absolute; top:10px; inset-inline-end:10px; width:32px; height:32px; border-radius:50%;
    background:rgba(21,18,14,0.55); display:flex; align-items:center; justify-content:center; color:var(--ivory);
  }
  .product-info{ padding:18px 18px 20px; display:flex; flex-direction:column; gap:8px; flex:1; }
  .product-info .cat{ font-size:11.5px; color:var(--amber-light); letter-spacing:0.4px; }
  .product-info h3{ font-size:17px; }
  .product-info .en-name{ font-size:12.5px; color:var(--ivory-dim); font-style:italic; font-family:'Instrument Serif', serif; }
  .stars{ display:flex; gap:3px; color:var(--amber); font-size:12px; }
  .price-row{ display:flex; align-items:baseline; gap:8px; margin-top:4px; }
  .price-now{ font-size:18px; font-weight:800; color:var(--ivory); }
  .price-old{ font-size:13px; color:var(--ivory-dim); text-decoration:line-through; }
  .add-btn{
    margin-top:10px; width:100%; padding:11px; border-radius:12px; background:var(--ink-3);
    border:1px solid var(--line); color:var(--ivory); font-size:13.5px; font-weight:700;
    display:flex; align-items:center; justify-content:center; gap:8px; transition:background .25s ease, transform .15s ease;
  }
  .add-btn:hover{ background:var(--amber); color:var(--ink); }
  .add-btn:active{ transform:scale(0.97); }

  /* ---------- stats ---------- */
  .stats-band{ background:var(--ink-2); border-block:1px solid var(--line); }
  .stats-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:20px; padding-block:52px; }
  @media (max-width:760px){ .stats-grid{ grid-template-columns:repeat(2,1fr); } }
  .stat{ text-align:center; }
  .stat b{ display:block; font-size:36px; color:var(--amber-light); font-family:'Reem Kufi', sans-serif; }
  body.lang-en .stat b{ font-family:'Instrument Serif', serif; font-style:italic; }
  .stat span{ font-size:13px; color:var(--ivory-dim); }

  /* ---------- testimonials ---------- */
  .testi-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
  @media (max-width:860px){ .testi-grid{ grid-template-columns:1fr; } }
  .testi-card{ background:var(--ink-2); border:1px solid var(--line); border-radius:var(--radius); padding:26px; }
  .testi-card .stars{ margin-bottom:14px; font-size:14px; }
  .testi-card p{ font-size:14.5px; color:var(--ivory-dim); margin-bottom:16px; }
  .testi-name{ font-size:13.5px; font-weight:700; color:var(--ivory); }
  .testi-loc{ font-size:12px; color:var(--amber-light); }

  /* ---------- payment strip ---------- */
  .pay-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:16px; }
  @media (max-width:860px){ .pay-grid{ grid-template-columns:repeat(2,1fr); } }
  .pay-card{
    background:var(--ink-2); border:1px solid var(--line); border-radius:16px; padding:20px 16px;
    text-align:center; font-size:13px; color:var(--ivory-dim);
  }
  .pay-card .ic{ font-size:26px; margin-bottom:10px; }
  .pay-card b{ display:block; color:var(--ivory); font-size:14px; margin-bottom:4px; }

  /* ---------- newsletter ---------- */
  .news-box{
    background:linear-gradient(135deg, var(--ink-3), var(--ink-2));
    border:1px solid var(--line); border-radius:28px; padding:52px; text-align:center;
  }
  .news-box h2{ font-size:28px; margin-bottom:10px; font-family:'Reem Kufi', sans-serif; }
  body.lang-en .news-box h2{ font-family:'Instrument Serif', serif; font-style:italic; }
  .news-box p{ color:var(--ivory-dim); margin-bottom:24px; font-size:14.5px; }
  .news-form{ display:flex; gap:10px; max-width:420px; margin:0 auto; }
  .news-form input{
    flex:1; padding:14px 18px; border-radius:999px; border:1px solid var(--line); background:var(--ink);
    color:var(--ivory); font-family:inherit; font-size:14px;
  }
  .news-form input:focus{ outline:2px solid var(--amber); outline-offset:1px; }
  @media (max-width:480px){ .news-form{ flex-direction:column; } }

  /* ---------- footer ---------- */
  footer{ border-top:1px solid var(--line); padding-block:56px 26px; }
  .foot-grid{ display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:32px; margin-bottom:40px; }
  @media (max-width:760px){ .foot-grid{ grid-template-columns:repeat(2,1fr); } }
  .foot-col h4{ font-size:14px; margin-bottom:16px; color:var(--ivory); }
  .foot-col a{ display:block; font-size:13.5px; color:var(--ivory-dim); margin-bottom:10px; transition:color .2s ease; }
  .foot-col a:hover{ color:var(--amber-light); }
  .foot-desc{ font-size:13.5px; color:var(--ivory-dim); max-width:280px; margin-top:14px; }
  .social-row{ display:flex; gap:10px; margin-top:18px; }
  .bottom-bar{ display:flex; justify-content:space-between; align-items:center; padding-top:24px; border-top:1px solid var(--line); flex-wrap:wrap; gap:12px; font-size:12.5px; color:var(--ivory-dim); }

  ::selection{ background:var(--amber); color:var(--ink); }

  /* ---------- page hero ---------- */
  .page-hero{ padding-block:52px 8px; }
  .crumbs{ font-size:12.5px; color:var(--ivory-dim); margin-bottom:14px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .crumbs a{ color:var(--ivory-dim); transition:color .2s ease; }
  .crumbs a:hover{ color:var(--amber-light); }
  .crumbs .sep{ opacity:.5; }
  .page-hero h1{ font-size:42px; font-family:'Reem Kufi', sans-serif; color:var(--ivory); margin-bottom:12px; }
  body.lang-en .page-hero h1{ font-family:'Instrument Serif', serif; font-style:italic; font-weight:400; }
  .page-hero p.lead{ font-size:15.5px; color:var(--ivory-dim); max-width:560px; }
  @media (max-width:560px){ .page-hero h1{ font-size:32px; } }

  /* ---------- order confirmation ---------- */
  .oc-wrap{ max-width:760px; margin:0 auto; padding-block:20px 90px; }

  .oc-hero{ text-align:center; margin-bottom:36px; }
  .oc-check{ width:88px; height:88px; border-radius:50%; margin:0 auto 22px; position:relative;
    background:rgba(62,107,85,.16); border:1px solid rgba(62,107,85,.45); display:flex; align-items:center; justify-content:center; }
  .oc-check svg{ width:44px; height:44px; }
  .oc-check::after{ content:""; position:absolute; inset:-8px; border-radius:50%; border:1px solid rgba(62,107,85,.25); animation:ocpulse 2.4s ease-out infinite; }
  @keyframes ocpulse{ 0%{ transform:scale(1); opacity:.7; } 100%{ transform:scale(1.25); opacity:0; } }
  .oc-hero h1{ font-size:32px; font-family:'Reem Kufi',sans-serif; color:var(--ivory); margin-bottom:10px; }
  body.lang-en .oc-hero h1{ font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; }
  .oc-hero p{ font-size:15px; color:var(--ivory-dim); }
  .oc-order-no{ display:inline-flex; align-items:center; gap:9px; margin-top:16px; background:var(--ink-2); border:1px solid var(--line); border-radius:999px; padding:9px 20px; font-size:14px; }
  .oc-order-no b{ color:var(--amber-light); font-weight:800; letter-spacing:.5px; }
  .oc-copy{ background:none; color:var(--ivory-dim); display:flex; align-items:center; }
  .oc-copy:hover{ color:var(--amber-light); }

  .wa-cta{ display:flex; align-items:center; gap:16px; background:linear-gradient(135deg, rgba(37,211,102,.16), var(--ink-2)); border:1px solid rgba(37,211,102,.4); border-radius:var(--radius); padding:20px 24px; margin-bottom:24px; }
  .wa-cta .wa-ic{ width:52px; height:52px; border-radius:50%; background:#25D366; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .wa-cta .wa-txt{ flex:1; }
  .wa-cta .wa-txt b{ font-size:15.5px; display:block; margin-bottom:2px; }
  .wa-cta .wa-txt span{ font-size:13px; color:var(--ivory-dim); }
  .wa-cta .wa-go{ background:#25D366; color:#04310f; font-weight:800; font-size:14px; padding:12px 22px; border-radius:999px; white-space:nowrap; transition:transform .2s ease; text-decoration:none; }
  .wa-cta .wa-go:hover{ transform:translateY(-2px); }
  @media (max-width:560px){ .wa-cta{ flex-direction:column; text-align:center; } .wa-cta .wa-go{ width:100%; text-align:center; } }

  .oc-steps{ display:grid; grid-template-columns:repeat(4,1fr); gap:0; background:var(--ink-2); border:1px solid var(--line); border-radius:var(--radius); padding:24px 16px; margin-bottom:24px; position:relative; }
  @media (max-width:560px){ .oc-steps{ grid-template-columns:repeat(2,1fr); gap:20px 0; } }
  .oc-step{ text-align:center; position:relative; padding:0 6px; }
  .oc-step .st-ic{ width:44px; height:44px; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:19px; background:var(--ink-3); border:1px solid var(--line); position:relative; z-index:2; }
  .oc-step.done .st-ic{ background:var(--jade); border-color:var(--jade); }
  .oc-step.active .st-ic{ background:var(--amber); border-color:var(--amber); color:var(--ink); box-shadow:0 0 0 5px rgba(200,138,62,.15); }
  .oc-step b{ font-size:13px; display:block; margin-bottom:2px; }
  .oc-step span{ font-size:11.5px; color:var(--ivory-dim); }
  .oc-step:not(:last-child)::after{ content:""; position:absolute; top:22px; inset-inline-start:calc(50% + 22px); width:calc(100% - 44px); height:2px; background:var(--line); z-index:1; }
  .oc-step.done:not(:last-child)::after{ background:var(--jade); }
  @media (max-width:560px){ .oc-step:not(:last-child)::after{ display:none; } }

  .oc-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
  @media (max-width:640px){ .oc-grid{ grid-template-columns:1fr; } }
  .oc-card{ background:var(--ink-2); border:1px solid var(--line); border-radius:var(--radius); padding:22px 24px; }
  .oc-card h3{ font-size:14px; color:var(--amber-light); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .oc-card .kv{ display:flex; justify-content:space-between; gap:12px; font-size:13.5px; margin-bottom:10px; }
  .oc-card .kv:last-child{ margin-bottom:0; }
  .oc-card .kv span{ color:var(--ivory-dim); }
  .oc-card .kv b{ color:var(--ivory); font-weight:600; text-align:end; }
  .oc-address{ font-size:13.5px; color:var(--ivory); line-height:1.7; }

  .oc-items{ background:var(--ink-2); border:1px solid var(--line); border-radius:var(--radius); padding:24px; margin-bottom:24px; }
  .oc-items h3{ font-size:16px; margin-bottom:18px; }
  .oc-line{ display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid var(--line); }
  .oc-line:last-of-type{ border-bottom:none; }
  .oc-th{ width:52px; height:52px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 42%, var(--c1) 0%, var(--c2) 72%, var(--ring) 100%); }
  .oc-th .pupil{ width:15px; height:15px; border-radius:50%; background:#0b0906; }
  .oc-line .li{ flex:1; }
  .oc-line .li b{ font-size:14px; }
  .oc-line .li span{ display:block; font-size:12px; color:var(--ivory-dim); }
  .oc-line .lp{ font-size:14px; font-weight:800; }
  .oc-tot{ margin-top:16px; padding-top:16px; border-top:1px solid var(--line); }
  .oc-tot .kv{ display:flex; justify-content:space-between; font-size:13.5px; color:var(--ivory-dim); margin-bottom:9px; }
  .oc-tot .kv b{ color:var(--ivory); }
  .oc-tot .grand{ display:flex; justify-content:space-between; font-size:18px; font-weight:800; color:var(--ivory); padding-top:12px; margin-top:4px; border-top:1px solid var(--line); }

  .oc-actions{ display:flex; gap:14px; flex-wrap:wrap; }
  .oc-actions a{ flex:1; min-width:180px; text-align:center; padding:14px; border-radius:999px; font-size:14.5px; font-weight:700; transition:transform .2s ease; }
  .oc-actions .primary{ background:var(--amber); color:var(--ink); box-shadow:0 10px 30px -10px rgba(200,138,62,.6); }
  .oc-actions .primary:hover{ transform:translateY(-2px); }
  .oc-actions .ghost{ background:transparent; color:var(--ivory); border:1px solid var(--line); }
  .oc-actions .ghost:hover{ border-color:var(--ivory-dim); transform:translateY(-2px); }
  .oc-note{ text-align:center; font-size:12.5px; color:var(--ivory-dim); margin-top:22px; }

</style>
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>
<body class="lang-ar">

<div class="wrap" style="max-width:900px; padding-block:40px 80px;">

  <!-- شاشة الدخول -->
  <div id="gate" style="max-width:420px; margin:60px auto;">
    <h1 style="font-size:1.6rem; text-align:center; margin-bottom:8px;">لوحة الطلبات</h1>
    <p style="color:var(--ivory-dim); font-size:13.5px; text-align:center; margin-bottom:26px;">اكتب كلمة السر للدخول</p>
    <input id="key" type="password" placeholder="كلمة السر" autocomplete="current-password"
      style="width:100%; padding:14px 16px; border-radius:12px; border:1px solid var(--line); background:var(--ink-2); color:var(--ivory); font-size:15px; margin-bottom:12px;">
    <button id="login" style="width:100%; padding:14px; border-radius:999px; border:none; background:var(--amber); color:#fff; font-weight:800; font-size:15px; cursor:pointer;">دخول</button>
    <p id="gate-msg" style="display:none; margin-top:12px; font-size:13px; color:#d9534f; text-align:center;"></p>
  </div>

  <!-- اللوحة -->
  <div id="panel" style="display:none;">

    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:18px;">
      <h1 style="font-size:1.5rem; margin:0;">الطلبات</h1>
      <div style="display:flex; gap:8px;">
        <button id="refresh" style="padding:9px 18px; border-radius:999px; border:1px solid var(--line); background:transparent; color:var(--ivory-dim); font-size:13px; cursor:pointer;">تحديث</button>
        <button id="logout" style="padding:9px 18px; border-radius:999px; border:1px solid var(--line); background:transparent; color:var(--ivory-dim); font-size:13px; cursor:pointer;">خروج</button>
      </div>
    </div>

    <!-- فلاتر الحالة -->
    <div id="tabs" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;"></div>

    <input id="search" type="search" placeholder="بحث برقم الطلب أو رقم الواتساب أو الاسم"
      style="width:100%; padding:12px 16px; border-radius:12px; border:1px solid var(--line); background:var(--ink-2); color:var(--ivory); font-size:14px; margin-bottom:18px;">

    <p id="list-msg" style="color:var(--ivory-dim); font-size:14px; text-align:center; padding:30px 0;">جاري التحميل...</p>
    <div id="list"></div>
  </div>

</div>

<script>
(function(){
  var API='https://lenseslover-orders.skymoonsport.workers.dev';
  var KEY='';
  var STATUS=[
    {k:'',          ar:'الكل'},
    {k:'new',       ar:'جديد'},
    {k:'confirmed', ar:'مؤكد'},
    {k:'packing',   ar:'بيتجهز'},
    {k:'shipped',   ar:'اتشحن'},
    {k:'delivered', ar:'اتسلم'},
    {k:'cancelled', ar:'ملغي'}
  ];
  var COLORS={ new:'#c88a3e', confirmed:'#3e8fc8', packing:'#8a6fc8', shipped:'#3ec8a0', delivered:'#4caf50', cancelled:'#d9534f' };
  var cur='';

  var $=function(id){ return document.getElementById(id); };

  function esc(t){ var d=document.createElement('div'); d.textContent=t==null?'':String(t); return d.innerHTML; }

  function api(path, opts){
    opts=opts||{};
    opts.headers=Object.assign({'Content-Type':'application/json','X-Admin-Key':KEY}, opts.headers||{});
    return fetch(API+path, opts).then(function(r){ return r.json(); });
  }

  /* ---------- الدخول ---------- */
  function tryLogin(k){
    KEY=k;
    return api('/admin/orders?limit=1').then(function(j){
      if(j && j.ok){
        try{ localStorage.setItem('ll_admin_key', k); }catch(e){}
        $('gate').style.display='none'; $('panel').style.display='block';
        renderTabs(); load();
        return true;
      }
      return false;
    }).catch(function(){ return false; });
  }

  $('login').onclick=function(){
    var k=$('key').value.trim();
    if(!k) return;
    $('gate-msg').style.display='none';
    tryLogin(k).then(function(ok){
      if(!ok){ $('gate-msg').textContent='كلمة السر غلط'; $('gate-msg').style.display='block'; }
    });
  };
  $('key').addEventListener('keydown', function(e){ if(e.key==='Enter') $('login').click(); });

  $('logout').onclick=function(){
    try{ localStorage.removeItem('ll_admin_key'); }catch(e){}
    location.reload();
  };

  /* ---------- الفلاتر ---------- */
  function renderTabs(counts){
    var box=$('tabs'); box.innerHTML='';
    STATUS.forEach(function(s){
      var n='';
      if(counts){
        if(s.k===''){ n=counts.reduce(function(a,c){ return a+c.n; },0); }
        else { var f=counts.find(function(c){ return c.status===s.k; }); n=f?f.n:0; }
        n=' ('+n+')';
      }
      var b=document.createElement('button');
      b.textContent=s.ar+n;
      b.style.cssText='padding:8px 15px; border-radius:999px; font-size:13px; cursor:pointer; border:1px solid '+
        (cur===s.k?'var(--amber)':'var(--line)')+'; background:'+(cur===s.k?'var(--amber)':'transparent')+
        '; color:'+(cur===s.k?'#fff':'var(--ivory-dim)')+';';
      b.onclick=function(){ cur=s.k; load(); };
      box.appendChild(b);
    });
  }

  /* ---------- القائمة ---------- */
  function statusSelect(o){
    var sel=document.createElement('select');
    sel.style.cssText='padding:7px 12px; border-radius:999px; border:1px solid var(--line); background:var(--ink); color:var(--ivory); font-size:12.5px; cursor:pointer;';
    STATUS.filter(function(s){ return s.k; }).forEach(function(s){
      var op=document.createElement('option');
      op.value=s.k; op.textContent=s.ar; op.selected=(o.status===s.k);
      sel.appendChild(op);
    });
    sel.onchange=function(){
      var v=sel.value; sel.disabled=true;
      api('/admin/status',{ method:'POST', body:JSON.stringify({ order_no:o.order_no, status:v }) })
        .then(function(j){
          sel.disabled=false;
          if(j && j.ok){ o.status=v; load(); }
          else alert('فشل التحديث');
        }).catch(function(){ sel.disabled=false; alert('مشكلة في الاتصال'); });
    };
    return sel;
  }

  function card(o){
    var d=new Date(o.created_at);
    var when=isNaN(d)?'':d.toLocaleString('ar-EG',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    var el=document.createElement('div');
    el.style.cssText='background:var(--ink-2); border:1px solid var(--line); border-inline-start:3px solid '+
      (COLORS[o.status]||'var(--line)')+'; border-radius:14px; padding:16px 18px; margin-bottom:12px;';

    var items=(o.items||[]).map(function(i){
      return '<div style="font-size:13px; color:var(--ivory-dim); padding:2px 0;">• '+esc(i.ar||i.en)+' × '+(i.qty||1)+'</div>';
    }).join('');

    el.innerHTML=
      '<div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:10px;">'+
        '<b style="color:var(--amber-light,var(--amber)); font-size:15px;">#'+esc(o.order_no)+'</b>'+
        '<span style="font-size:12px; color:var(--ivory-dim);">'+esc(when)+'</span>'+
      '</div>'+
      '<div style="font-size:14px; margin-bottom:4px;">'+esc(o.name)+
        ' — <a href="https://wa.me/'+esc(String(o.whatsapp).replace(/[^0-9]/g,''))+'" target="_blank" style="color:var(--jade-light,#3ec8a0); text-decoration:none;">'+esc(o.whatsapp)+'</a></div>'+
      '<div style="font-size:13px; color:var(--ivory-dim); margin-bottom:10px;">'+
        esc([o.governorate,o.area,o.address].filter(Boolean).join(' — '))+'</div>'+
      items+
      '<div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding-top:12px; border-top:1px solid var(--line);">'+
        '<b style="font-size:15px;">'+(o.total||0)+' '+esc(o.currency||'EGP')+'</b>'+
        '<span class="slot"></span>'+
      '</div>';

    el.querySelector('.slot').appendChild(statusSelect(o));
    return el;
  }

  var timer=null;
  function load(){
    $('list-msg').textContent='جاري التحميل...'; $('list-msg').style.display='block';
    var q=$('search').value.trim();
    api('/admin/orders?limit=100'+(cur?'&status='+cur:'')+(q?'&q='+encodeURIComponent(q):''))
      .then(function(j){
        if(!j || !j.ok){ $('list-msg').textContent='حصلت مشكلة في التحميل'; return; }
        renderTabs(j.counts);
        var box=$('list'); box.innerHTML='';
        if(!j.orders.length){ $('list-msg').textContent='مفيش طلبات'; return; }
        $('list-msg').style.display='none';
        j.orders.forEach(function(o){ box.appendChild(card(o)); });
      })
      .catch(function(){ $('list-msg').textContent='مشكلة في الاتصال'; });
  }

  $('refresh').onclick=load;
  $('search').addEventListener('input', function(){
    clearTimeout(timer); timer=setTimeout(load, 400);
  });

  /* دخول تلقائي لو الباسورد محفوظ */
  try{
    var saved=localStorage.getItem('ll_admin_key');
    if(saved) tryLogin(saved);
  }catch(e){}
})();
</script>

</body>
</html>
